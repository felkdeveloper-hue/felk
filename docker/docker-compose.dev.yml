# Local infrastructure only (MongoDB + Redis)
services:
  mongodb:
    image: mongo:7
    container_name: fe-platform-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: fe-platform

  redis:
    image: redis:7-alpine
    container_name: fe-platform-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mongo_data:
  redis_data:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — FE Platform</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fafafa;
        color: #171717;
      }
      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Check your connection and try again. Cached pages may still be available.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
